name: Python CI with uv

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: python

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            python/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('python/uv.lock') }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run task ruff

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            python/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('python/uv.lock') }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run task test
